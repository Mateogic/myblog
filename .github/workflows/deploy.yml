name: Deploy Blog

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # 统一 locale 避免某些依赖因环境差异输出中文或报错
      LANG: en_US.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 pnpm (不自动执行 install)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      # 设置 Node 并启用 pnpm 缓存
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Print versions
        run: |
          node -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static files
        run: pnpm docs:build

      - name: Debug SSH
        run: |
          echo "Host: ${{ secrets.BLOG_SERVER_HOST }}"
          echo "User: ${{ secrets.BLOG_SERVER_USER }}"
          echo "Key: ${{ secrets.BLOG_SERVER_SSH_KEY }}"

      - name: SSH key passphrase
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.BLOG_SERVER_HOST }}
          username: ${{ secrets.BLOG_SERVER_USER }}
          key: ${{ secrets.BLOG_SERVER_SSH_KEY }}
          port: 22
          passphrase: ${{ secrets.BLOG_SERVER_SSH_KEY_PASSPHRASE }}
          script: |
            mkdir -p ~/.ssh
            ssh-keyscan -H ${{ secrets.BLOG_SERVER_HOST }} >> ~/.ssh/known_hosts
            rsync -avz --delete docs/.vitepress/dist/ ${{ secrets.BLOG_SERVER_USER }}@${{ secrets.BLOG_SERVER_HOST }}:${{ secrets.BLOG_PATH }}
            ssh ${{ secrets.BLOG_SERVER_USER }}@${{ secrets.BLOG_SERVER_HOST }} "docker restart blog"